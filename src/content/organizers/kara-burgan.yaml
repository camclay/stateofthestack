name: Kara Burgan
role: organizer
company: MITRE Corp.
bio: >-
  It's been an interesting ride!  Kara spent a decade working on Avionics and
  ESM systems at LM Federal Systems-Owego. Then kids came and she decided to
  take 15 year hiatus.  During this time, she performed a lot of volunteer work
  with the PTA, Girl Scouts, and other organizations. Returning to work in July
  2018, she has been employed with The MITRE Corporation for 8 years with a
  specialization in Agile/DevSecOps transformations.  
   
